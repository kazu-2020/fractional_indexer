name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['*']
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜日 UTC 0:00 (JST 9:00)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.1', '3.2', '3.3', '3.4', '4.0']
        include:
          - ruby-version: '3.3'
            upload_codecov: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec
      - name: Upload coverage reports to Codecov
        if: matrix.upload_codecov && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: kazu-2020/fractional_indexer
          files: coverage/coverage.xml

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Run Rubocop
        run: bundle exec rubocop
